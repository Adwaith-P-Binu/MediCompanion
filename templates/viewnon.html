{% load static %}
{% include 'header.html' %}

<div class="site-section">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h2 class="h3 mb-5 text-black">Drug</h2>
      </div>
      <div class="col-md-12">
        <form method="GET" action="">
          <input type="text" name="q" value="{{ query }}" placeholder="Search Medicine or Non-Medicine Name" class="form-control mb-3" />
          <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <table class="table table-bordered" width="100%">
          <tr>
            <th>ID</th>
            <th>Medicine Name</th>
            <th>Non Medicine Name</th>
          </tr>
          {% for i in res %}
          <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ i.medicine }}</td>
            <td>{{ i.nonmedicine }}</td>
          </tr>
          {% endfor %}
        </table>
      </div>
    </div>
  </div>
</div>

{% include 'footer.html' %}
